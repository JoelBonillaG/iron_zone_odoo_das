name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python, manifests and XML
        run: python .github/scripts/validate_repo.py

  deploy:
    name: Deploy to Odoo server
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/iron_zone_odoo_das' }}
      ODOO_DB: ${{ vars.ODOO_DB || 'iron_zone' }}

    steps:
      - name: Check required secrets
        shell: bash
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          test -n "$SSH_USER"
          test -n "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'KEY'
          ${{ secrets.SSH_PRIVATE_KEY }}
          KEY
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' ODOO_DB='$ODOO_DB' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch origin --prune
          git checkout main
          git pull --ff-only origin main

          DB_NAME="$ODOO_DB" bash scripts/install_apps.sh

          docker compose ps
          curl -fsS http://127.0.0.1:8069/web/login >/dev/null
          REMOTE
