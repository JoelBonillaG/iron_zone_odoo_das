name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python, manifests and XML
        run: python .github/scripts/validate_repo.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate root Node dependencies
        run: npm ci

      - name: Check root JavaScript syntax
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(*.js scripts/**/*.js)
          if [ "${#files[@]}" -gt 0 ]; then
            for file in "${files[@]}"; do
              node --check "$file"
            done
          fi

      - name: Validate E2E dependency lockfile
        working-directory: pruebas_e2e
        run: npm ci

      - name: Check E2E JavaScript syntax
        working-directory: pruebas_e2e
        shell: bash
        run: |
          shopt -s nullglob
          for file in *.js; do
            node --check "$file"
          done
